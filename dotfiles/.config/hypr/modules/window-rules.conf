# Window Rules

windowrule {
  name = 
  match:class = 
  float = on
  center = on
  size = monitor_w*0.5 monitor_h*0.75
}

windowrule {
  name = nvim
  match:class = nvim
  float = on
  center = on
  size = monitor_w*0.5 monitor_h*0.9
}

windowrule {
  name = portal
  match:class = xdg-desktop-portal-gtk
  float = on
  center = on
  size = monitor_w*0.5 monitor_h*0.75
}

windowrule {
  name = Vellum
  match:class = chrome-localhost__-Default
  fullscreen = on
}

windowrule {
  name = fullscreen_programs
  match:class = ^(imv|mpv|rmpc)$
  fullscreen = on
}

windowrule {
  name = bitwarden
  match:class = Bitwarden
  float = on
  center = on
  size = monitor_w*0.6 monitor_h*0.75
}

windowrule {
  name = thunar
  match:class = ^(thunar|Thunar)$
  float = on
  center = on
  size = monitor_w*0.5 monitor_h*0.75
}

windowrule {
  name = btop
  match:class = btop
  float = on
  center = on
  size = monitor_w*0.9 monitor_h*0.9
}

windowrule {
  name = calculator
  match:class = org.gnome.Calculator
  float = on
  pin = on
  size = 360 540
  move = 1500 110
}

windowrule {
  name = ChromiumDevToolsApp
  match:class = chromium-browser
  match:initial_title = DevToolsApp 
  float = on
  center = on
  size = monitor_w*0.5 monitor_h*0.75
}

windowrule {
  name = Steam
  match:class = steam
  workspace = special:games
  tile = on
  # maximize = off
  fullscreen = off
  float = on
  no_initial_focus = on
}

windowrule {
  name = SteamGames
  match:initial_class = ^steam_app_.*$
  workspace = special:games
  fullscreen = on
  no_initial_focus = on
}

